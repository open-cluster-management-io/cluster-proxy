clusterName: loopback

agentDeploymentName: cluster-proxy-proxy-agent

includeNamespaceCreation: false

# Image registry
registry: quay.io/open-cluster-management

# Image of the cluster-gateway instances
image: cluster-proxy
tag:

proxyAgentImage:
proxyAgentImagePullSecrets: []

# Number of replicas
replicas: 1

spokeAddonNamespace: "open-cluster-management-cluster-proxy"
additionalProxyAgentArgs: []
additionalServiceProxyArgs: []

agentDeploymentAnnotations: {}

addonAgentArgs: []

serviceEntryPoint: ""
serviceEntryPointPort: 8091

base64EncodedCAData: Zm9vCg==

serviceDomain: ""

nodeSelector: {}

tolerations:
- key: "dedicated"
  operator: "Equal"
  value: "infra"
  effect: "NoSchedule"
- key: node-role.kubernetes.io/infra
  operator: Exists
  effect: NoSchedule

proxyConfig:
  HTTP_PROXY: null
  HTTPS_PROXY: null
  NO_PROXY: null

enableImpersonation: "true"

# Opt-in NetworkPolicy for the spoke proxy-agent Deployment.
# Set by the hub addon-manager from --enable-network-policies
# (charts/cluster-proxy values networkPolicies.enabled).
networkPolicies:
  enabled: false

# OIDC authentication for service-proxy; see pkg/serviceproxy/readme.md section 5
oidcIssuerURL: ""
oidcClientID: ""
oidcUsernameClaim: ""
oidcUsernamePrefix: ""
oidcGroupsClaim: ""
oidcGroupsPrefix: ""
oidcReservedNamePrefixes:
  - "system:"
oidcCAConfigMap: ""
oidcSigningAlgs: []
oidcRequiredClaimsJSON: ""

global:
  resourceRequirements: []
