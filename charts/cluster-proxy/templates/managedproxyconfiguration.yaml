{{- $proxyServerImage := include "cluster-proxy-common.proxyServerImage" . }}
{{- $proxyAgentImage := include "cluster-proxy-common.proxyAgentRepositoryImage" . }}
apiVersion: proxy.open-cluster-management.io/v1alpha1
kind: ManagedProxyConfiguration
metadata:
  name: cluster-proxy
spec:
  authentication:
    dump:
      secrets: {}
    signer:
      type: SelfSigned
  proxyServer:
    image: {{ $proxyServerImage }}
    replicas: {{ .Values.replicas }}
    namespace: {{ .Release.Namespace }}
    entrypoint:
      {{- if .Values.proxyServer.entrypointAddress }}
      type: Hostname
      hostname:
        value: {{ .Values.proxyServer.entrypointAddress }}
      {{- else if .Values.proxyServer.entrypointLoadBalancer }}
      type: LoadBalancerService
      loadBalancerService: {}
      {{- else  }}
      type: PortForward
      {{- end }}
      port: {{ .Values.proxyServer.port }}
  proxyAgent:
    image: {{ $proxyAgentImage }}
    replicas: {{ .Values.replicas }}
  {{- if .Values.userServer.enabled }}
  userServer:
  {{- if .Values.userServer.additionalSANs }}
    additionalSANs:
      {{- toYaml .Values.userServer.additionalSANs | nindent 6 }}
  {{- else }}
    {}
  {{- end }}
  {{- end }}
